<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Formulário</title>
</head>
<body>
    <h2>Cadastro de Contato</h2>
    
  
    <form onsubmit="exibirDados(event)">
        <input type="text" id="nome" placeholder="Nome completo" required><br><br>
        
   
        <input type="email" id="email" placeholder="E-mail" required onchange="validar(this)"><br><br>
        
        <textarea id="mensagem" placeholder="Sua mensagem"></textarea><br><br>
        
        <button type="submit">Enviar</button>
    </form>

   
    <div id="painel-resumo"></div>

    <script src="script.js"></script>
</body>
</html>
